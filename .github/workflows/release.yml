name: Build & Release

on:
  push:
    tags:
      - 'v*'

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        run: npx tauri build

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Find build artifacts
        id: artifacts
        shell: powershell
        run: |
          Write-Host "=== Listing all bundle files ==="
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File | ForEach-Object { Write-Host $_.FullName }

          # Find NSIS zip
          $nsisZip = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Filter "*.nsis.zip" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          $nsisSig = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Filter "*.nsis.zip.sig" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          $setupExe = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Filter "*.exe" -File -ErrorAction SilentlyContinue | Select-Object -First 1

          # Fallback to MSI
          if (-not $nsisZip) {
            $nsisZip = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Filter "*.msi.zip" -File -ErrorAction SilentlyContinue | Select-Object -First 1
            $nsisSig = Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Filter "*.msi.zip.sig" -File -ErrorAction SilentlyContinue | Select-Object -First 1
          }

          if ($nsisZip) {
            $installerPath = $nsisZip.FullName.Replace('\', '/')
            $installerName = $nsisZip.Name
            Write-Host "Found installer: $installerPath"
            "INSTALLER=$installerPath" >> $env:GITHUB_OUTPUT
            "INSTALLER_NAME=$installerName" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "ERROR: No installer zip found!"
            exit 1
          }

          if ($nsisSig) {
            $sigPath = $nsisSig.FullName.Replace('\', '/')
            Write-Host "Found signature: $sigPath"
            "SIGNATURE=$sigPath" >> $env:GITHUB_OUTPUT
          }

          if ($setupExe) {
            $exePath = $setupExe.FullName.Replace('\', '/')
            Write-Host "Found exe: $exePath"
            "SETUP_EXE=$exePath" >> $env:GITHUB_OUTPUT
          }

      - name: Read signature
        id: sig
        shell: bash
        run: |
          SIG_FILE="${{ steps.artifacts.outputs.SIGNATURE }}"
          if [ -n "$SIG_FILE" ] && [ -f "$SIG_FILE" ]; then
            SIG_CONTENT=$(cat "$SIG_FILE")
            echo "SIGNATURE=$SIG_CONTENT" >> $GITHUB_OUTPUT
          else
            echo "WARNING: No signature file found"
            echo "SIGNATURE=" >> $GITHUB_OUTPUT
          fi

      - name: Update latest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          INSTALLER_NAME="${{ steps.artifacts.outputs.INSTALLER_NAME }}"
          SIG="${{ steps.sig.outputs.SIGNATURE }}"

          cat > updates/latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "v$VERSION — Auto-release",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "url": "https://github.com/${{ github.repository }}/releases/download/v$VERSION/$INSTALLER_NAME",
                "signature": "$SIG"
              }
            }
          }
          EOF

      - name: Commit updated latest.json
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git add updates/latest.json
          git commit -m "chore: update latest.json for v${{ steps.version.outputs.VERSION }}" || true
          git push origin main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NOVA STREAM v${{ steps.version.outputs.VERSION }}"
          body: |
            ## NOVA STREAM v${{ steps.version.outputs.VERSION }}

            Auto-built release. Download the installer below.
          files: |
            ${{ steps.artifacts.outputs.INSTALLER }}
            ${{ steps.artifacts.outputs.SETUP_EXE }}
          draft: false
          prerelease: false
